org: luyza
app: uiuibiometrics
service: backend

provider:
  name: aws
  region: eu-north-1
  stage: ${opt:stage, 'dev'}
  timeout: 29
  environment:
    DYNAMODB_TABLE: uiui-biometrics-${self:provider.stage}
    STAGE: ${self:provider.stage}
    AVATAR_BUCKET: uiui-avatars-${self:provider.stage}
    USER_POOL_ID: "eu-north-1_aBOOx7l1A"
    STRIPE_SECRET_KEY: ${env:STRIPE_SECRET_KEY}
    STRIPE_WEBHOOK_SECRET: ${env:STRIPE_WEBHOOK_SECRET}
    VISION_API_KEY: ${env:VISION_API_KEY}
    FRONTEND_URL: https://d2lndt521kfd7b.cloudfront.net

  ecr:
    images:
      uiui-app-image:
        path: ./
        platform: linux/amd64
        provenance: false

  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:DeleteItem
        - dynamodb:UpdateItem
        - dynamodb:PutItem
        - dynamodb:Query
        - dynamodb:BatchWriteItem
      Resource:
        - !GetAtt UiuibiometricsTable.Arn
        - !Join [ '/', [ !GetAtt UiuibiometricsTable.Arn, 'index', '*' ] ]
    - Effect: Allow
      Action:
        - s3:PutObject
        - s3:GetObject
      Resource:
        - "arn:aws:s3:::uiui-avatars-${self:provider.stage}/*"
    - Effect: Allow
      Action:
        - cognito-idp:AdminGetUser
        - cognito-idp:AdminListGroupsForUser
        - cognito-idp:ListUsers
        - cognito-idp:AdminAddUserToGroup
        - cognito-idp:AdminRemoveUserFromGroup
        - cognito-idp:DescribeUserPool
        - cognito-idp:ListUsersInGroup
      Resource:
        - "arn:aws:cognito-idp:${self:provider.region}:*:userpool/eu-north-1_aBOOx7l1A"

  httpApi:
    cors:
      allowedOrigins:
        - https://d2lndt521kfd7b.cloudfront.net
        - http://localhost:5173
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: false
    authorizers:
      serviceAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/eu-north-1_aBOOx7l1A
        audience:
          - 3a7gjc7aq8v5auneeuqtfvcb1a

custom:
  serverless-offline:
    ignoreJWTSignature: true
    httpTimeout: 60000

  pythonRequirements:
    dockerizePip: true
    layer: false

  plugins:
    local:
      list: [
        serverless-s3-local,
        serverless-dynamodb,
        serverless-offline
      ]
    dev: []
    acc:
      list: []
    prod:
      list: []

  s3:
    host: localhost
    port: 4569
    directory: ./offline/s3
    cors: false
    buckets:
      - uiui-avatars-${self:provider.stage}

  serverless-dynamodb:
    stages:
      - local
    start:
      port: 8011
      inMemory: true
      migrate: true
      seed: true
    seed:
      local:
        sources:
          - table: uiui-biometrics-${self:provider.stage}
            sources: [ ./offline/migrations/uiui.json ]

