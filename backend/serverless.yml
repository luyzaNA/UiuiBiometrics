resources:
  Resources:
    UiuibiometricsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: uiui-biometrics-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1_PK
            AttributeType: S
          - AttributeName: GSI1_SK
            AttributeType: S
          - AttributeName: GSI2_PK
            AttributeType: S
          - AttributeName: GSI2_SK
            AttributeType: S
          - AttributeName: GSI3_PK
            AttributeType: S
          - AttributeName: GSI3_SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1_PK
                KeyType: HASH
              - AttributeName: GSI1_SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2
            KeySchema:
              - AttributeName: GSI2_PK
                KeyType: HASH
              - AttributeName: GSI2_SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI3
            KeySchema:
              - AttributeName: GSI3_PK
                KeyType: HASH
              - AttributeName: GSI3_SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST
    AvatarBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: uiui-avatars-${self:provider.stage}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: [ "*" ]
              AllowedMethods: [ GET, PUT ]
              AllowedOrigins: [ "*" ]